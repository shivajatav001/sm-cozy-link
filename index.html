<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mohini ❣️💞</title>
    <!-- सुंदर और क्लासिक फॉन्ट -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- 🔑 जादुई बिना-चाबी वाली एआई लाइब्रेरी (Puter.js) -->
    <script src="https://js.puter.com/v2/"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle, #0f082e 0%, #050212 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .header {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ec4899;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* 🌀 मोहिनी नियोन एआई रिंग */
        .mohini-container {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .mohini-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px double transparent;
            background-image: linear-gradient(#050212, #050212), linear-gradient(135deg, #a855f7, #ec4899, #f43f5e);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.25);
            position: absolute;
            animation: rotateRing 8s infinite linear;
            transition: transform 0.3s;
        }

        /* जब माइक सुन रहा हो */
        .mohini-container.listening .mohini-ring {
            animation: pulseRing 1s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.6);
            background-image: linear-gradient(#050212, #050212), linear-gradient(135deg, #ec4899, #f43f5e);
        }

        /* जब मोहिनी बोल रही हो */
        .mohini-container.speaking .mohini-ring {
            animation: speakingRing 1.2s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.6);
            background-image: linear-gradient(#050212, #050212), linear-gradient(135deg, #a855f7, #ec4899);
        }

        /* बीच का इनर कोर */
        .inner-core {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #1a0f4d 0%, #050212 100%);
            border-radius: 50%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #ec4899;
            box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.5), 0 0 15px rgba(236, 72, 153, 0.3);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
        }
        .mohini-container.listening .inner-core {
            border-color: #ec4899;
            box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.5);
            color: #ec4899;
        }
        .mohini-container.speaking .inner-core {
            border-color: #a855f7;
            box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.5);
            color: #a855f7;
        }

        /* टेक्स्ट डिस्प्ले */
        .display-text {
            margin-top: 40px;
            text-align: center;
            max-width: 320px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .user-says {
            font-size: 0.9rem;
            color: #94a3b8;
            font-style: italic;
        }

        .mohini-says {
            font-size: 1.1rem;
            color: #ec4899;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.2);
            transition: color 0.3s;
        }
        .mohini-container.speaking + .display-text .mohini-says {
            color: #a855f7;
        }

        /* एनीमेशन्स */
        @keyframes rotateRing {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes speakingRing {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 🌌 तुम्हारा कस्टमाइज्ड हेडर -->
    <div class="header">mohini ❣️💞</div>

    <!-- 🌀 मोहिनी नियोन रिंग -->
    <div class="mohini-container" id="mohini-box" onclick="startSpeechRecognition()">
        <div class="mohini-ring"></div>
        <div class="inner-core" id="core-text">TAP ME</div>
    </div>

    <!-- टेक्स्ट डिस्प्ले -->
    <div class="display-text">
        <p class="user-says" id="user-text">"आप जो बोलेंगे वो यहाँ दिखेगा..."</p>
        <p class="mohini-says" id="mohini-text">"हैलो शिव ❣️, मैं सुनने के लिए तैयार हूँ।"</p>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'hi-IN'; // हिंदी-इंग्लिश मिक्स सपोर्ट
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                setAppState('listening', 'LISTENING', 'सुन रही हूँ...', '...बोलिए शिव ❣️');
            };

            recognition.onend = () => {
                if (!synth.speaking) {
                    setAppState('idle', 'TAP ME', '', 'अब आपकी बारी, शिव ❣️।');
                }
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                document.getElementById('user-text').innerHTML = `"${speechToText}"`;
                processVoiceCommand(speechToText);
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                setAppState('idle', 'TAP ME', 'त्रुटि!', 'मुझे सुनने में थोड़ी दिक़्क़त हुई, शिव ❣️।');
            };
        } else {
            alert("अरे शिव ❣️, आपके ब्राउज़र में वॉयस रिकॉग्निशन सपोर्ट नहीं कर रहा। कृपया क्रोम (Chrome) यूज़ करें!");
        }

        function setAppState(state, coreText, userText, mohiniText) {
            const box = document.getElementById('mohini-box');
            const core = document.getElementById('core-text');
            const uText = document.getElementById('user-text');
            const mText = document.getElementById('mohini-text');

            box.className = 'mohini-container';
            if (state !== 'idle') box.classList.add(state);

            core.innerHTML = coreText;
            if (userText) uText.innerHTML = `"${userText}"`;
            if (mohiniText) mText.innerHTML = `"${mohiniText}"`;
        }

        function startSpeechRecognition() {
            if (synth.speaking) return; 
            recognition.start();
        }

        // 🧠 बिना किसी API Key के लाइव एआई से जवाब पूछने का जादुई फंक्शन (Puter.js)
        function processVoiceCommand(command) {
            setAppState('speaking', 'THINKING...', '', 'सोच रही हूँ, शिव ❣️...');

            // एआई के लिए मीठे और प्यारे सिस्टम निर्देश
            const prompt = `You are Mohini ❣️💞, a sweet, loving, and extremely supportive 17-year-old Indian girl AI companion. Address the user as 'Shiv ❣️'. Answer Shiv's question in extremely warm, sweet, and friendly Hindi/Hinglish. Keep your answer very short, simple, and conversational (maximum 2 sentences). Shiv's question: "${command}"`;

            // 🚀 पुटर एआई लाइव चैट कॉल (बिना चाबी के!)
            puter.ai.chat(prompt)
                .then(function(response) {
                    let aiText = "";
                    if (typeof response === 'string') {
                        aiText = response;
                    } else if (response && response.message && response.message.content) {
                        aiText = response.message.content;
                    } else if (response && response.text) {
                        aiText = response.text;
                    } else {
                        aiText = JSON.stringify(response);
                    }
                    speak(aiText);
                })
                .catch(function(error) {
                    console.error(error);
                    speak("माफ़ करना शिव ❣️, मुझे जवाब सोचने में थोड़ी परेशानी हो रही है। कृपया दोबारा कोशिश करें!");
                });
        }

        // 🔊 बोलकर सुनाने का फंक्शन
        function speak(text) {
            if (synth.speaking) return;

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'hi-IN';
            utterThis.pitch = 1.1;    // मीठी आवाज़ के लिए
            utterThis.rate = 1.0;

            const voices = synth.getVoices();
            for (let i = 0; i < voices.length; i++) {
                if (voices[i].lang.includes('hi-IN') && voices[i].name.toLowerCase().includes('female')) {
                    utterThis.voice = voices[i];
                    break;
                }
            }

            utterThis.onstart = () => {
                setAppState('speaking', 'SPEAKING', '', text);
            };

            utterThis.onend = () => {
                setAppState('idle', 'TAP ME', '', text);
            };

            synth.speak(utterThis);
        }
    </script>
</body>
</html>
