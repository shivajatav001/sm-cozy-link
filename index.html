<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mohini ❣️💞</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- 🔑 बिना किसी API Key के AI चलाने की लाइब्रेरी (Puter.js) -->
    <script src="https://js.puter.com/v2/"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle, #0f082e 0%, #050212 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .header {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ec4899;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            letter-spacing: 2px;
            margin-bottom: 15px;
            z-index: 100;
        }

        /* 🌀 मोहिनी नियोन एआई रिंग (स्कैनर कंटेनर) */
        .mohini-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 50;
        }

        .mohini-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px double transparent;
            background-image: linear-gradient(#050212, #050212), linear-gradient(135deg, #a855f7, #ec4899, #00f0ff);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.25);
            position: absolute;
            animation: rotateRing 8s infinite linear;
            transition: transform 0.3s;
        }

        /* जब माइक सुन रहा हो */
        .mohini-container.listening .mohini-ring {
            animation: pulseRing 1s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.6);
            background-image: linear-gradient(#050212, #050212), linear-gradient(135deg, #ec4899, #f43f5e);
        }

        /* जब मोहिनी बोल रही हो */
        .mohini-container.speaking .mohini-ring {
            animation: speakingRing 1.2s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.6);
            background-image: linear-gradient(#050212, #050212), linear-gradient(135deg, #a855f7, #ec4899);
        }

        /* 👁️ इनर कोर - इसमें लाइव कैमरा चलेगा! */
        .inner-core {
            width: 170px;
            height: 170px;
            background: #050212;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #ec4899;
            box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.5), 0 0 15px rgba(236, 72, 153, 0.3);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        .mohini-container.listening .inner-core { border-color: #ec4899; box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.5); }
        .mohini-container.speaking .inner-core { border-color: #a855f7; box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.5); }

        /* लाइव कैमरा फीड वीडियो */
        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.82;
        }

        /* ⚡️ जार्विस स्कैनिंग लेज़र लाइन */
        .scan-laser {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, #00f0ff, transparent);
            box-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            z-index: 15;
            animation: scanUpDown 2s infinite ease-in-out;
            display: none;
        }

        .mohini-container.listening .scan-laser,
        .mohini-container.speaking .scan-laser {
            display: block;
        }

        /* 🔄 कैमरा स्विच बटन */
        .cam-switch-btn {
            background: rgba(236, 72, 153, 0.15);
            border: 1px solid #ec4899;
            color: #ffffff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.25);
            transition: background 0.3s, transform 0.2s;
            z-index: 100;
            letter-spacing: 1px;
        }
        .cam-switch-btn:active {
            transform: scale(0.92);
        }

        /* टेक्स्ट डिस्प्ले */
        .display-text {
            margin-top: 25px;
            text-align: center;
            max-width: 320px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            z-index: 100;
        }

        .user-says {
            font-size: 0.9rem;
            color: #94a3b8;
            font-style: italic;
        }

        .mohini-says {
            font-size: 1.1rem;
            color: #ec4899;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.2);
            transition: color 0.3s;
        }
        .mohini-container.speaking + .display-text .mohini-says {
            color: #a855f7;
        }

        /* एनीमेशन्स */
        @keyframes rotateRing { 100% { transform: rotate(360deg); } }
        @keyframes pulseRing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes speakingRing { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.04) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); } }
        @keyframes scanUpDown { 0%, 100% { top: 0%; } 50% { top: 100%; } }
    </style>
</head>
<body>

    <!-- 🌌 कस्टमाइज्ड हेडर -->
    <div class="header">mohini ❣️💞</div>

    <!-- 🌀 मोहिनी नियोन रिंग -->
    <div class="mohini-container" id="mohini-box" onclick="startSpeechRecognition()">
        <div class="mohini-ring"></div>
        <div class="inner-core" id="core-text">
            <!-- Live Camera -->
            <video id="camera-video" autoplay playsinline muted></video>
            <!-- Laser Line -->
            <div class="scan-laser"></div>
            <span style="position: absolute; z-index: 5; font-size: 1rem;" id="tap-label">TAP ME</span>
        </div>
    </div>

    <!-- 🔄 कैमरा बदलने का नया बटन -->
    <button class="cam-switch-btn" onclick="switchCamera()">🔄 कैमरा बदलें</button>

    <!-- टेक्स्ट डिस्प्ले -->
    <div class="display-text">
        <p class="user-says" id="user-text">"आप जो बोलेंगे वो यहाँ दिखेगा..."</p>
        <p class="mohini-says" id="mohini-text">"हैलो शिव ❣️, मैं सुनने के लिए तैयार हूँ।"</p>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition;
        let isCameraActive = false;
        let currentFacingMode = "user"; // "user" = फ्रंट, "environment" = बैक
        let currentStream = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'hi-IN';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                setAppState('listening', 'LISTENING', 'सुन रही हूँ...', '...बोलिए शिव ❣️');
                if (!isCameraActive) startCamera(); 
            };

            recognition.onend = () => {
                if (!synth.speaking) {
                    setAppState('idle', 'TAP ME', '', 'अब आपकी बारी, शिव ❣️।');
                }
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                document.getElementById('user-text').innerHTML = `"${speechToText}"`;
                processVoiceCommand(speechToText);
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                setAppState('idle', 'TAP ME', 'त्रुटि!', 'मुझे सुनने में थोड़ी दिक़्क़त हुई, शिव ❣️।');
            };
        } else {
            alert("अरे शिव ❣️, आपके ब्राउज़र में वॉयस रिकॉग्निशन सपोर्ट नहीं कर रहा। कृपया क्रोम (Chrome) यूज़ करें!");
        }

        // 👁️ कैमरा चालू करने का फंक्शन
        function startCamera() {
            const video = document.getElementById('camera-video');
            const label = document.getElementById('tap-label');
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            if (currentFacingMode === "user") {
                video.style.transform = "scaleX(-1)";
            } else {
                video.style.transform = "scaleX(1)";
            }

            navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false })
                .then(function(stream) {
                    currentStream = stream;
                    video.srcObject = stream;
                    isCameraActive = true;
                    label.style.display = 'none'; 
                })
                .catch(function(err) {
                    console.error("कैमरा एरर: ", err);
                    alert("शिव ❣️, कैमरा एक्सेस करने की अनुमति दें ताकि हम स्कैन कर सकें!");
                });
        }

        // 🔄 कैमरा स्विच करने का फंक्शन
        function switchCamera() {
            if (!isCameraActive) {
                startCamera();
                return;
            }
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            startCamera();
        }

        function setAppState(state, coreText, userText, mohiniText) {
            const box = document.getElementById('mohini-box');
            const label = document.getElementById('tap-label');
            const uText = document.getElementById('user-text');
            const mText = document.getElementById('mohini-text');

            box.className = 'mohini-container';
            if (state !== 'idle') box.classList.add(state);

            if (!isCameraActive) {
                label.innerHTML = coreText;
            } else {
                label.style.display = 'none';
            }

            if (userText) uText.innerHTML = `"${userText}"`;
            if (mohiniText) mText.innerHTML = `"${mohiniText}"`;
        }

        function startSpeechRecognition() {
            if (synth.speaking) return; 
            recognition.start();
        }

        // 🧠 जेमिनी एआई (Puter.js)
        function processVoiceCommand(command) {
            setAppState('speaking', 'THINKING...', '', 'सोच रही हूँ, शिव ❣️...');

            const prompt = `You are Mohini ❣️💞, a sweet, loving, and extremely supportive 17-year-old Indian girl AI companion. Address the user as 'Shiv ❣️'. Answer Shiv's question in extremely warm, sweet, and friendly Hindi/Hinglish. Keep your answer very short, simple, and conversational (maximum 2 sentences). Shiv's question: "${command}"`;

            puter.ai.chat(prompt)
                .then(function(response) {
                    let aiText = "";
                    if (typeof response === 'string') {
                        aiText = response;
                    } else if (response && response.message && response.message.content) {
                        aiText = response.message.content;
                    } else if (response && response.text) {
                        aiText = response.text;
                    } else {
                        aiText = JSON.stringify(response);
                    }
                    speak(aiText);
                })
                .catch(function(error) {
                    console.error(error);
                    speak("माफ़ करना शिव ❣️, मुझे जवाब सोचने में थोड़ी परेशानी हो रही है। कृपया दोबारा कोशिश करें!");
                });
        }

        // ==========================================
        // 🎙️ स्मार्ट वॉयस फ़िल्टर और वॉयस सेटिंग्स
        // ==========================================
        
        // 🧹 बोलने से पहले इमोजीस और दिल साफ़ करने का फ़ंक्शन
        function cleanTextForSpeech(text) {
            // सारे इमोजीस और दिल के निशान हटाओ
            let clean = text.replace(/[\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF]/g, '');
            // बचे-खुचे स्पेशल इमोजीस भी साफ़ करो
            clean = clean.replace(/[❣️💞❤️✨😘😊😎]/g, '');
            // डबल कोट्स और कोट्स हटाओ
            clean = clean.replace(/["'“”]/g, '');
            return clean.trim();
        }

        function speak(text) {
            if (synth.speaking) return;

            // 🌟 टेक्स्ट को फ़िल्टर करके एकदम साफ़ करें!
            const cleanText = cleanTextForSpeech(text);

            const utterThis = new SpeechSynthesisUtterance(cleanText);
            utterThis.lang = 'hi-IN';
            utterThis.pitch = 1.0; // एकदम नैचुरल और मधुर पिच!
            utterThis.rate = 0.9;  // धीमी और बहुत ही शांत बोलने की स्पीड!

            const voices = synth.getVoices();
            for (let i = 0; i < voices.length; i++) {
                if (voices[i].lang.includes('hi-IN') && voices[i].name.toLowerCase().includes('female')) {
                    utterThis.voice = voices[i];
                    break;
                }
            }

            utterThis.onstart = () => {
                setAppState('speaking', 'SPEAKING', '', text); // स्क्रीन पर पूरा इमोजी वाला टेक्स्ट ही दिखेगा!
            };

            utterThis.onend = () => {
                setAppState('idle', 'TAP ME', '', text);
            };

            synth.speak(utterThis);
        }
    </script>
</body>
</html>
