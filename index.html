<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mohini ❣️💞</title>
    <!-- सुंदर और क्लासिक फॉन्ट -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- 🔑 बिना किसी API Key के AI चलाने की लाइब्रेरी (Puter.js) -->
    <script src="https://js.puter.com/v2/"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* पूरी स्क्रीन ही टैप बटन की तरह काम करेगी */
        body {
            background: radial-gradient(circle, #0e072b 0%, #040110 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer; /* छूने का संकेत */
        }

        .header {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ec4899;
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            letter-spacing: 2px;
            margin-bottom: 30px;
            z-index: 100;
        }

        /* 🔮 दो तैरते और चमकते हुए नियोन बिंदु */
        .dots-container {
            display: flex;
            gap: 20px;
            margin: 40px 0;
            z-index: 50;
        }

        .dot {
            width: 16px;
            height: 16px;
            background-color: #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #00f0ff, 0 0 30px #00f0ff;
            animation: floatDots 1.5s infinite ease-in-out;
            transition: background-color 0.5s, box-shadow 0.5s;
        }

        /* दूसरे बिंदु का डिले ताकि दोनों ऊपर-नीचे तैरें */
        .dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        /* जब माइक सुन रहा हो (Listening - Pink Dots) */
        body.listening .dot {
            background-color: #ec4899;
            box-shadow: 0 0 20px #ec4899, 0 0 40px #ec4899;
            animation: pulseDots 0.8s infinite ease-in-out;
        }

        /* जब एआई सोच रहा हो (Thinking - Yellow/Gold Dots) */
        body.thinking .dot {
            background-color: #f59e0b;
            box-shadow: 0 0 20px #f59e0b, 0 0 40px #f59e0b;
            animation: blinkDots 1s infinite ease-in-out;
        }

        /* जब मोहिनी बोल रही हो (Speaking - Purple Dots) */
        body.speaking .dot {
            background-color: #a855f7;
            box-shadow: 0 0 20px #a855f7, 0 0 40px #a855f7;
            animation: floatDots 1.2s infinite ease-in-out;
        }

        /* टेक्स्ट डिस्प्ले */
        .display-text {
            margin-top: 30px;
            text-align: center;
            max-width: 320px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            z-index: 100;
        }

        .user-says {
            font-size: 0.9rem;
            color: #64748b;
            font-style: italic;
        }

        .mohini-says {
            font-size: 1.15rem;
            color: #ec4899;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.2);
            line-height: 1.5;
            transition: color 0.3s;
        }
        body.speaking .mohini-says {
            color: #a855f7;
        }

        /* एनीमेशन्स */
        @keyframes floatDots {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes pulseDots {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        @keyframes blinkDots {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body id="app-body" onclick="startSpeechRecognition()">

    <!-- 👁️ लाइव कैमरा वीडियो एलिमेंट (इसे बिल्कुल अदृश्य/छुपा दिया गया है!) -->
    <video id="camera-video" autoplay playsinline muted style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></video>

    <!-- 🌌 कस्टमाइज्ड हेडर -->
    <div class="header">mohini ❣️💞</div>

    <!-- 🔮 दो चमकते और तैरते हुए नियोन बिंदु (The Pulse Core) -->
    <div class="dots-container">
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <!-- टेक्स्ट डिस्प्ले -->
    <div class="display-text">
        <p class="user-says" id="user-text">"बोलने के लिए स्क्रीन पर कहीं भी टच करें..."</p>
        <p class="mohini-says" id="mohini-text">"हैलो शिव ❣️, मैं सुनने के लिए तैयार हूँ।"</p>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition;
        let isCameraActive = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'hi-IN'; // हिंदी-इंग्लिश मिक्स सपोर्ट
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                setAppState('listening', 'सुन रही हूँ...', '...बोलिए शिव ❣️');
                if (!isCameraActive) startCamera(); // पहली बार टच करते ही कैमरा चुपचाप बैकग्राउंड में चालू होगा!
            };

            recognition.onend = () => {
                if (!synth.speaking) {
                    setAppState('idle', '', 'अब आपकी बारी, शिव ❣️।');
                }
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                document.getElementById('user-text').innerHTML = `"${speechToText}"`;
                processVoiceCommand(speechToText);
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                setAppState('idle', 'त्रुटि!', 'मुझे सुनने में थोड़ी दिक़्क़त हुई, शिव ❣️।');
            };
        } else {
            alert("अरे शिव ❣️, आपके ब्राउज़र में वॉयस रिकॉग्निशन सपोर्ट नहीं कर रहा। कृपया क्रोम (Chrome) यूज़ करें!");
        }

        // 👁️ कैमरा चुपचाप बैकग्राउंड में चालू करने का फंक्शन (स्क्रीन पर नहीं दिखेगा!)
        function startCamera() {
            const video = document.getElementById('camera-video');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(function(stream) {
                    video.srcObject = stream;
                    isCameraActive = true;
                })
                .catch(function(err) {
                    console.error("Camera access blocked: ", err);
                });
        }

        function setAppState(state, userText, mohiniText) {
            const body = document.getElementById('app-body');
            const uText = document.getElementById('user-text');
            const mText = document.getElementById('mohini-text');

            body.className = '';
            if (state !== 'idle') body.classList.add(state);

            if (userText) uText.innerHTML = `"${userText}"`;
            if (mohiniText) mText.innerHTML = `"${mohiniText}"`;
        }

        function startSpeechRecognition() {
            if (synth.speaking) return; // जब एआई बोल रहा हो, तब टच काम नहीं करेगा
            recognition.start();
        }

        // 🧠 जेमिनी एआई (Puter.js) - दुनिया का कोई भी जवाब सोचने का फंक्शन!
        function processVoiceCommand(command) {
            setAppState('thinking', '', 'सोच रही हूँ, शिव ❣️...');

            const prompt = `You are Mohini ❣️💞, a sweet, loving, and extremely supportive 17-year-old Indian girl AI companion. Address the user as 'Shiv ❣️'. Answer Shiv's question in extremely warm, sweet, and friendly Hindi/Hinglish. Keep your answer very short, simple, and conversational (maximum 2 sentences). Shiv's question: "${command}"`;

            puter.ai.chat(prompt)
                .then(function(response) {
                    let aiText = "";
                    if (typeof response === 'string') {
                        aiText = response;
                    } else if (response && response.message && response.message.content) {
                        aiText = response.message.content;
                    } else if (response && response.text) {
                        aiText = response.text;
                    } else {
                        aiText = JSON.stringify(response);
                    }
                    speak(aiText);
                })
                .catch(function(error) {
                    console.error(error);
                    speak("माफ़ करना शिव ❣️, मुझे जवाब सोचने में थोड़ी परेशानी हो रही है। कृपया दोबारा कोशिश करें!");
                });
        }

        // ==========================================
        // 🎙️ स्मार्ट वॉयस फ़िल्टर और वॉयस सेटिंग्स
        // ==========================================
        
        // 🧹 बोलने से पहले दिल और इमोजीस साफ़ करने का फ़ंक्शन
        function cleanTextForSpeech(text) {
            let clean = text.replace(/[\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF]/g, '');
            clean = clean.replace(/[❣️💞❤️✨😘😊😎🥰👑🌅🎙️👀📱⚡️🌀🧠]/g, '');
            clean = clean.replace(/["'“”]/g, '');
            return clean.trim();
        }

        function speak(text) {
            if (synth.speaking) return;

            const cleanText = cleanTextForSpeech(text);

            const utterThis = new SpeechSynthesisUtterance(cleanText);
            utterThis.lang = 'hi-IN';
            utterThis.pitch = 1.0; // एकदम नैचुरल और मधुर पिच!
            utterThis.rate = 0.9;  // धीमी और बहुत ही शांत बोलने की स्पीड!

            const voices = synth.getVoices();
            for (let i = 0; i < voices.length; i++) {
                if (voices[i].lang.includes('hi-IN') && voices[i].name.toLowerCase().includes('female')) {
                    utterThis.voice = voices[i];
                    break;
                }
            }

            utterThis.onstart = () => {
                setAppState('speaking', '', text); // स्क्रीन पर पूरा टेक्स्ट ही दिखेगा!
            };

            utterThis.onend = () => {
                setAppState('idle', '', text);
            };

            synth.speak(utterThis);
        }
    </script>
</body>
</html>
